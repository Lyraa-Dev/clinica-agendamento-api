# Usei H2 para facilitar a execução do projeto (que deveria ser realizado preferencialmente em um banco de dados Oracle).
# O H2 é um banco de dados em memória, e quem for reproduzir nao precisa instalar nada. O parametro MODE=Oracle faz o 
# H2 interpretar a sintaxe SQL como o Oracle faria


spring.datasource.url=jdbc:h2:mem:clinicadb;MODE=Oracle;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
 
# Hibernate cria/atualiza as tabelas automaticamente a partir das entidades.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
 
# Faz o data.sql (seed) rodar DEPOIS que o Hibernate cria as tabelas.
# Sem isso, o seed falharia com "tabela nao encontrada".
spring.jpa.defer-datasource-initialization=true
 
# Console web do H2 para inspecionar o banco em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
 
# Swagger/OpenAPI em http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html